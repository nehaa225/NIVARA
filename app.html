<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Public+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  #ngo-hub-root {
    --ink: #26261f;
    --paper: #f6f3ec;
    --indigo: #22385a;
    --indigo-deep: #16263d;
    --marigold: #dd9a2e;
    --moss: #4c6e50;
    --coral: #b64d38;
    --line: #ddd6c4;
    font-family: 'Public Sans', sans-serif;
    color: var(--ink);
    background: var(--paper);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  #ngo-hub-root * { box-sizing: border-box; }
  #ngo-hub-root h1, #ngo-hub-root h2, #ngo-hub-root h3 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    margin: 0;
    color: var(--indigo-deep);
  }
  .nh-shell { display: flex; min-height: 620px; }
  .nh-nav {
    width: 190px;
    background: var(--indigo-deep);
    padding: 20px 12px;
    flex-shrink: 0;
  }
  .nh-brand { display: flex; align-items: center; gap: 8px; padding: 0 8px 18px; border-bottom: 1px solid rgba(255,255,255,0.12); margin-bottom: 14px; }
  .nh-seal { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--marigold); display: flex; align-items: center; justify-content: center; color: var(--marigold); font-family: 'Fraunces', serif; font-size: 13px; flex-shrink: 0; }
  .nh-brand span { font-family: 'Fraunces', serif; color: #f6f3ec; font-size: 15px; font-weight: 600; }
  .nh-tab {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 10px; border-radius: 8px; margin-bottom: 3px;
    color: #cfd3d9; font-size: 13px; cursor: pointer; user-select: none;
    border: none; background: transparent; width: 100%; text-align: left;
    font-family: 'Public Sans', sans-serif;
  }
  .nh-tab i { font-size: 16px; width: 16px; }
  .nh-tab:hover { background: rgba(255,255,255,0.06); color: #fff; }
  .nh-tab.active { background: var(--marigold); color: var(--indigo-deep); font-weight: 600; }
  .nh-main { flex: 1; padding: 26px 30px; overflow-y: auto; max-height: 680px; }
  .nh-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--moss); margin-bottom: 4px; display: block; }
  .nh-lede { color: #6b6a5f; font-size: 13.5px; margin-top: 6px; line-height: 1.55; max-width: 520px; }
  .nh-card { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-top: 16px; }
  .nh-field { margin-bottom: 12px; }
  .nh-field label { display: block; font-size: 12.5px; color: #6b6a5f; margin-bottom: 4px; font-weight: 500; }
  .nh-field input, .nh-field select, .nh-field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid var(--line); border-radius: 6px;
    font-family: 'Public Sans', sans-serif; font-size: 13.5px; background: #fdfcf9; color: var(--ink);
  }
  .nh-field textarea { resize: vertical; min-height: 60px; }
  .nh-row { display: flex; gap: 12px; }
  .nh-row > .nh-field { flex: 1; }
  .nh-btn {
    background: var(--indigo); color: #fff; border: none; padding: 9px 18px;
    border-radius: 7px; font-size: 13.5px; font-weight: 600; cursor: pointer; font-family: 'Public Sans', sans-serif;
  }
  .nh-btn:hover { background: var(--indigo-deep); }
  .nh-btn.ghost { background: transparent; color: var(--indigo); border: 1px solid var(--indigo); }
  .nh-btn.mini { padding: 5px 10px; font-size: 12px; }
  .nh-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 20px; font-family: 'IBM Plex Mono', monospace; }
  .nh-badge.pending { background: #f3e6cd; color: #8a5f16; }
  .nh-badge.verified { background: #dbe7dc; color: var(--moss); }
  .nh-badge.rejected { background: #f2dcd6; color: var(--coral); }
  .nh-list-item { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 12px 14px; margin-top: 10px; }
  .nh-list-item h4 { font-family: 'Public Sans', sans-serif; font-weight: 600; font-size: 13.5px; margin: 0 0 3px; color: var(--ink); }
  .nh-list-item p { margin: 0; font-size: 12.5px; color: #6b6a5f; }
  .nh-empty { text-align: center; padding: 30px 20px; color: #9a9888; font-size: 13px; border: 1px dashed var(--line); border-radius: 10px; margin-top: 16px; }
  .nh-chat-log { display: flex; flex-direction: column; gap: 10px; max-height: 340px; overflow-y: auto; padding: 4px 2px; }
  .nh-msg { max-width: 78%; padding: 9px 13px; border-radius: 10px; font-size: 13.5px; line-height: 1.5; }
  .nh-msg.user { align-self: flex-end; background: var(--indigo); color: #fff; border-bottom-right-radius: 3px; }
  .nh-msg.agent { align-self: flex-start; background: #fff; border: 1px solid var(--line); border-bottom-left-radius: 3px; }
  .nh-chat-input-row { display: flex; gap: 8px; margin-top: 12px; }
  .nh-chat-input-row input { flex: 1; padding: 9px 12px; border: 1px solid var(--line); border-radius: 20px; font-size: 13.5px; font-family: 'Public Sans', sans-serif; }
  .nh-mic-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line); background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--indigo); flex-shrink: 0; }
  .nh-mic-btn.rec { background: var(--coral); color: #fff; border-color: var(--coral); }
  .nh-lang-select { font-size: 12px; padding: 5px 8px; border-radius: 6px; border: 1px solid var(--line); font-family: 'Public Sans', sans-serif; }
  .nh-stat-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top: 16px; }
  .nh-stat { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 14px; text-align: center; }
  .nh-stat b { font-family: 'Fraunces', serif; font-size: 22px; display: block; color: var(--indigo-deep); }
  .nh-stat span { font-size: 11px; color: #9a9888; }
  .nh-note { font-size: 11.5px; color: #9a9888; margin-top: 10px; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
</style>

<div id="ngo-hub-root">
  <div class="nh-shell">
    <div class="nh-nav" id="nh-nav"></div>
    <div class="nh-main" id="nh-main"></div>
  </div>
</div>

<script>
(function(){
  const TABS = [
    { id: 'register', icon: 'ti-clipboard-text', label: 'NGO registration' },
    { id: 'agent', icon: 'ti-message-circle-2', label: 'AI agent' },
    { id: 'funders', icon: 'ti-target-arrow', label: 'Funders & applications' },
    { id: 'donations', icon: 'ti-gift', label: 'Donations' },
    { id: 'collab', icon: 'ti-building-community', label: 'Org collaboration' },
    { id: 'jobs', icon: 'ti-briefcase', label: 'Jobs and internships' },
    { id: 'events', icon: 'ti-calendar-event', label: 'Events' },
    { id: 'directory', icon: 'ti-list-details', label: 'Public NGO directory' },
    { id: 'admin-hub', icon: 'ti-shield-check', label: 'Admin hub' },
  ];
  let active = 'register';
  let role = null;
  let ngoProfile = null;
  let citizenProfile = null;
  let orgProfile = null;
  let chatLog = [];
  let language = 'te';
  let listening = false;
  let audioOn = true;
  let citizenMode = 'register';
  let orgMode = 'register';
  let citizenLoginError = '';
  let orgLoginError = '';
  let citizenRegStep = 'form'; // 'form' | 'otp'
  let citizenOtp = null;
  let citizenPendingProfile = null;
  let citizenOtpError = '';
  let adminAuthed = false;
  let adminPasscodeError = '';
  const ADMIN_PASSCODE = 'NIVARA-ADMIN';
  let registerFormError = '';
  let adminNgoAssessments = {};
  let adminOrgAssessments = {};
  let adminFunderCache = null;
  let fundersDirCache = null;
  let fundersMatchCache = null;
  let fundersMatchNotice = '';
  let liveFundersCache = null;
  let liveFundersLoading = false;
  let liveFundersNotice = '';
  let currentDraft = null;
  let myApplicationsCache = null;

  const ROLE_META = {
    ngo: { label: 'NGO', icon: 'ti-building-bank', desc: 'Register, get verified, and access the AI funding agent.' },
    citizen: { label: 'Citizen', icon: 'ti-user', desc: 'Donate items and browse verified NGOs.' },
    org: { label: 'Organization', icon: 'ti-building-community', desc: 'Get verified, offer CSR collaboration, host events, post openings, and donate.' },
    admin: { label: 'Admin', icon: 'ti-shield-check', desc: 'Review and verify NGO and organization submissions.' },
  };
  const ROLE_TABS = {
    ngo: ['agent', 'funders', 'donations', 'collab', 'jobs', 'events', 'directory'],
    citizen: ['donations', 'jobs', 'directory'],
    org: ['collab', 'jobs', 'events', 'donations', 'directory'],
    admin: ['admin-hub'],
  };
  function isAuthed() {
    if (role === 'ngo') return !!(ngoProfile && ngoProfile.status === 'verified');
    if (role === 'citizen') return !!citizenProfile;
    if (role === 'org') return !!(orgProfile && orgProfile.status === 'verified');
    if (role === 'admin') return !!adminAuthed;
    return false;
  }
  function preAuthTab() {
    if (role === 'ngo') return 'register';
    if (role === 'citizen') return 'citizen-login';
    if (role === 'org') return 'org-login';
    if (role === 'admin') return 'admin-login';
    return null;
  }

  const LANGS = {
    te: { label: 'తెలుగు', speech: 'te-IN', name: 'Telugu' },
    hi: { label: 'हिन्दी', speech: 'hi-IN', name: 'Hindi' },
    en: { label: 'English', speech: 'en-IN', name: 'English' },
    ta: { label: 'தமிழ்', speech: 'ta-IN', name: 'Tamil' },
    kn: { label: 'ಕನ್ನಡ', speech: 'kn-IN', name: 'Kannada' },
    mr: { label: 'मराठी', speech: 'mr-IN', name: 'Marathi' },
    bn: { label: 'বাংলা', speech: 'bn-IN', name: 'Bengali' },
    gu: { label: 'ગુજરાતી', speech: 'gu-IN', name: 'Gujarati' },
    pa: { label: 'ਪੰਜਾਬੀ', speech: 'pa-IN', name: 'Punjabi' },
    ur: { label: 'اردو', speech: 'ur-IN', name: 'Urdu' },
  };

  function speakText(text) {
    if (!audioOn || !window.speechSynthesis) return;
    try {
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = LANGS[language].speech;
      const voices = window.speechSynthesis.getVoices();
      const match = voices.find(v => v.lang === LANGS[language].speech) || voices.find(v => v.lang.startsWith(language));
      if (match) utter.voice = match;
      window.speechSynthesis.speak(utter);
    } catch(e) { console.error(e); }
  }
  window.nhSpeak = (i) => { const m = chatLog[i]; if (m) speakText(m.text); };

  const nav = document.getElementById('nh-nav');
  const main = document.getElementById('nh-main');

  function render() {
    if (!role) {
      nav.innerHTML = `<div class="nh-brand"><div class="nh-seal">N</div><span>NIVARA</span></div>`;
      main.innerHTML = roleGateView();
      bindRoleGate();
      return;
    }
    const authed = isAuthed();
    const tabIds = authed ? ROLE_TABS[role] : [preAuthTab()];
    if (!tabIds.includes(active)) active = tabIds[0];
    const loginLabels = { 'citizen-login': { icon: 'ti-login-2', label: 'Citizen login' }, 'org-login': { icon: 'ti-login-2', label: 'Organization login' }, 'admin-login': { icon: 'ti-login-2', label: 'Admin login' } };
    nav.innerHTML = `
      <div class="nh-brand"><div class="nh-seal">N</div><span>NIVARA</span></div>
      <div style="font-size:10.5px;color:#9099a8;padding:0 8px 10px;text-transform:uppercase;letter-spacing:.05em;">${ROLE_META[role].label} account</div>
      ${tabIds.map(id => {
        const m = TABS.find(t => t.id === id) || loginLabels[id];
        return `<button class="nh-tab ${active===id?'active':''}" data-tab="${id}"><i class="ti ${m.icon}"></i>${m.label}</button>`;
      }).join('')}
      ${!authed ? `<p style="color:#8b8a7c;font-size:11px;line-height:1.5;padding:10px 8px 0;">Log in to unlock the rest of the hub.</p>` : ''}
      <button class="nh-tab" id="switch-role-btn" style="margin-top:14px;border-top:1px solid rgba(255,255,255,0.12);padding-top:12px;"><i class="ti ti-arrow-left"></i>Switch account type</button>
    `;
    nav.querySelectorAll('.nh-tab[data-tab]').forEach(b => b.onclick = () => { active = b.dataset.tab; render(); });
    const switchBtn = document.getElementById('switch-role-btn');
    if (switchBtn) switchBtn.onclick = () => { role = null; render(); };
    main.innerHTML = renderTab(active);
    bindTab(active);
  }

  // ---------- Role gate ----------
  function roleGateView() {
    return `
      <span class="nh-eyebrow">Welcome</span>
      <h2>Who's logging in?</h2>
      <p class="nh-lede">Pick an account type. NGOs go through verification before the hub unlocks; citizens and organizations get a quick login.</p>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:18px;">
        ${Object.entries(ROLE_META).map(([code, r]) => `
          <button class="nh-card" data-role="${code}" style="text-align:left;cursor:pointer;border:1px solid var(--line);width:100%;background:#fff;font-family:inherit;color:inherit;">
            <i class="ti ${r.icon}" style="font-size:22px;color:var(--indigo);"></i>
            <h3 style="font-size:15px;margin-top:10px;">${r.label}</h3>
            <p style="font-size:12.5px;color:#6b6a5f;margin-top:4px;line-height:1.5;">${r.desc}</p>
          </button>
        `).join('')}
      </div>
    `;
  }
  function bindRoleGate() {
    main.querySelectorAll('[data-role]').forEach(b => b.onclick = () => { role = b.dataset.role; active = preAuthTab(); render(); });
  }

  function citizenLoginView() {
    const isReg = citizenMode === 'register';
    const showOtp = isReg && citizenRegStep === 'otp';
    return `
      <span class="nh-eyebrow">Citizen access</span>
      <h2>${showOtp ? 'Verify your phone number' : isReg ? 'Register as a citizen' : 'Citizen login'}</h2>
      <p class="nh-lede">${showOtp ? `Enter the OTP sent to ${citizenPendingProfile ? citizenPendingProfile.phone : 'your phone'}.` : isReg ? 'A one-time code confirms your phone number so NGOs know who\'s donating.' : 'Enter the phone number you registered with.'}</p>
      ${!showOtp ? `
      <div style="display:flex;gap:6px;margin-top:12px;">
        <button class="nh-btn ${isReg?'':'ghost'} mini" id="cz-mode-register">Register</button>
        <button class="nh-btn ${!isReg?'':'ghost'} mini" id="cz-mode-login">Login</button>
      </div>` : ''}
      <div class="nh-card">
        ${showOtp ? `
          <div class="nh-field"><label>Enter OTP</label><input id="cz-otp-input" placeholder="6-digit code" maxlength="6"></div>
          <p class="nh-note">Demo mode: no SMS gateway is connected, so the code is shown here instead of texted &mdash; it's <b>${citizenOtp}</b>. A production version would send this by SMS.</p>
          <div style="display:flex;gap:8px;">
            <button class="nh-btn" id="cz-otp-verify">Verify &amp; create account</button>
            <button class="nh-btn ghost" id="cz-otp-back">Back</button>
          </div>
          ${citizenOtpError ? `<p class="nh-note" style="color:var(--coral);">${citizenOtpError}</p>` : ''}
        ` : isReg ? `
          <div class="nh-row">
            <div class="nh-field"><label>Full name</label><input id="cz-name" placeholder="e.g. Ramesh Kumar"></div>
            <div class="nh-field"><label>Phone number</label><input id="cz-phone" placeholder="e.g. 9876543210"></div>
          </div>
          <button class="nh-btn" id="cz-submit-btn">Send OTP</button>
        ` : `
          <div class="nh-field"><label>Phone number</label><input id="cz-login-phone" placeholder="e.g. 9876543210"></div>
          <button class="nh-btn" id="cz-submit-btn">Login</button>
        `}
        ${!showOtp && citizenLoginError ? `<p class="nh-note" style="color:var(--coral);">${citizenLoginError}</p>` : ''}
      </div>
    `;
  }
  function bindCitizenLogin() {
    if (citizenRegStep === 'otp') {
      document.getElementById('cz-otp-verify').onclick = async () => {
        const entered = document.getElementById('cz-otp-input').value.trim();
        if (entered !== citizenOtp) { citizenOtpError = 'Incorrect OTP. Please try again.'; render(); return; }
        const profile = citizenPendingProfile;
        try { await window.storage.set('citizen:' + profile.phone, JSON.stringify(profile), false); } catch(e) {}
        citizenProfile = profile;
        citizenRegStep = 'form'; citizenOtp = null; citizenPendingProfile = null; citizenOtpError = '';
        render();
      };
      document.getElementById('cz-otp-back').onclick = () => {
        citizenRegStep = 'form'; citizenOtp = null; citizenPendingProfile = null; citizenOtpError = '';
        render();
      };
      return;
    }
    document.getElementById('cz-mode-register').onclick = () => { citizenMode = 'register'; citizenLoginError=''; render(); };
    document.getElementById('cz-mode-login').onclick = () => { citizenMode = 'login'; citizenLoginError=''; render(); };
    document.getElementById('cz-submit-btn').onclick = async () => {
      if (citizenMode === 'register') {
        const name = document.getElementById('cz-name').value.trim();
        const phone = document.getElementById('cz-phone').value.trim();
        if (!name || !phone) { citizenLoginError = 'Enter both name and phone number.'; render(); return; }
        citizenPendingProfile = { name, phone };
        citizenOtp = String(Math.floor(100000 + Math.random() * 900000));
        citizenOtpError = '';
        citizenRegStep = 'otp';
        render();
      } else {
        const phone = document.getElementById('cz-login-phone').value.trim();
        if (!phone) { citizenLoginError = 'Enter your phone number.'; render(); return; }
        try {
          const r = await window.storage.get('citizen:' + phone, false);
          citizenProfile = JSON.parse(r.value);
          citizenLoginError = '';
          render();
        } catch(e) {
          citizenLoginError = 'No account found for this number. Try registering instead.';
          render();
        }
      }
    };
  }

  function orgLoginView() {
    const isReg = orgMode === 'register';
    return `
      <span class="nh-eyebrow">Organization access</span>
      <h2>${isReg ? 'Register your organization' : 'Organization login'}</h2>
      <p class="nh-lede">${isReg ? 'Companies and foundations register here to post CSR collaboration offers, jobs, events, and donations. Verification checks your details before the hub unlocks.' : 'Enter the email you registered with.'}</p>
      ${isReg && orgProfile ? orgStatusBanner(orgProfile.status) : ''}
      <div style="display:flex;gap:6px;margin-top:12px;">
        <button class="nh-btn ${isReg?'':'ghost'} mini" id="og-mode-register">Register</button>
        <button class="nh-btn ${!isReg?'':'ghost'} mini" id="og-mode-login">Login</button>
      </div>
      <div class="nh-card">
        ${isReg ? `
          <div class="nh-row">
            <div class="nh-field"><label>Organization name</label><input id="og-name" value="${orgProfile?.name||''}" placeholder="e.g. Acme Foundation"></div>
            <div class="nh-field"><label>Contact email</label><input id="og-email" value="${orgProfile?.email||''}" placeholder="e.g. csr@acme.com"></div>
          </div>
          <div class="nh-row">
            <div class="nh-field"><label>Sector / focus</label><input id="og-sector" value="${orgProfile?.sector||''}" placeholder="e.g. Corporate CSR, education"></div>
            <div class="nh-field"><label>Registration / CIN number</label><input id="og-regid" value="${orgProfile?.regid||''}" placeholder="e.g. U74999TG2015NPL098765"></div>
          </div>
          <button class="nh-btn" id="og-submit-btn">Submit for verification</button>
          <p class="nh-note">Submissions go to the admin portal, where an AI check flags plausibility issues and a human admin makes the final call. A production version would also check against MCA/company registries.</p>
        ` : `
          <div class="nh-field"><label>Contact email</label><input id="og-login-email" placeholder="e.g. csr@acme.com"></div>
          <button class="nh-btn" id="og-submit-btn">Login</button>
        `}
        ${orgLoginError ? `<p class="nh-note" style="color:var(--coral);">${orgLoginError}</p>` : ''}
      </div>
    `;
  }
  function orgStatusBanner(status) {
    if (status === 'verified') return `<div class="nh-card" style="border-color:#c7d9c9;background:#f2f7f2;display:flex;justify-content:space-between;align-items:center;">
      <div><h3 style="font-size:15px;">Access granted</h3><p class="nh-lede" style="margin-top:2px;">Your organization is verified. Explore collaboration, jobs, events, and donations.</p></div>
      <span class="nh-badge verified"><i class="ti ti-check"></i>Verified</span></div>`;
    if (status === 'pending') return `<div class="nh-card" style="border-color:var(--line);background:#fdfaf2;"><span class="nh-badge pending"><i class="ti ti-clock"></i>Pending review</span><p class="nh-lede" style="margin-top:8px;">Sent to the admin portal. An AI plausibility check plus a human admin review both happen before the hub unlocks — this can take a little time.</p></div>`;
    if (status === 'rejected') return `<div class="nh-card" style="border-color:#e3c6bc;background:#fbf1ee;"><span class="nh-badge rejected"><i class="ti ti-x"></i>Needs correction</span><p class="nh-lede" style="margin-top:8px;">The admin reviewed this and asked for changes. Check that the organization name, a valid email, sector, and registration number are all filled in, then resubmit.</p></div>`;
    return '';
  }
  function bindOrgLogin() {
    document.getElementById('og-mode-register').onclick = () => { orgMode = 'register'; orgLoginError=''; render(); };
    document.getElementById('og-mode-login').onclick = () => { orgMode = 'login'; orgLoginError=''; render(); };
    document.getElementById('og-submit-btn').onclick = async () => {
      if (orgMode === 'register') {
        const name = document.getElementById('og-name').value.trim();
        const email = document.getElementById('og-email').value.trim();
        const sector = document.getElementById('og-sector').value.trim();
        const regid = document.getElementById('og-regid').value.trim();
        const emailLooksValid = /\S+@\S+\.\S+/.test(email);
        const allFilled = name && email && sector && regid;
        if (!allFilled) { orgLoginError = 'Please fill in every field before submitting.'; render(); return; }
        if (!emailLooksValid) { orgLoginError = 'Enter a valid email address.'; render(); return; }
        orgLoginError = '';
        // Submissions are queued as pending — the admin portal's AI check and human review decide
        // verified/rejected from here (see adminSetOrgStatus), not this form.
        const profile = { name, email, sector, regid, status: 'pending' };
        try {
          await window.storage.set('org:' + email, JSON.stringify(profile), true);
        } catch(e) { console.error(e); }
        orgProfile = profile;
        render();
      } else {
        const email = document.getElementById('og-login-email').value.trim();

  function maskBank(bank) {

  async function aiAssessRecord(type, record) {
    const label = type === 'ngo' ? 'NGO' : 'organization';
    const fields = type === 'ngo'
      ? { name: record.name, registration_number: record.reg, certificate_number: record.cert, year_established: record.year, area_of_work: record.area }
      : { name: record.name, email: record.email, sector: record.sector, registration_or_cin: record.regid };
    const sys = `You help a NIVARA hub admin do a first-pass plausibility check on a ${label} registration submission. You have no access to official registries (India's NGO Darpan, MCA, or income-tax exemption databases) — you can only judge internal consistency and plausibility of the text given, not confirm anything is real.
Look for: placeholder or joke text, formats that don't resemble real Indian ${type === 'ngo' ? 'NGO registration / 12A-80G certificate' : 'company / CIN registration'} numbers, implausible dates, and vague descriptions with no concrete specifics.
Respond with ONLY a JSON object, no markdown fences, no extra text:
{"recommendation": "plausible" | "needs_more_info" | "red_flags", "reasoning": "one or two plain-language sentences for the admin"}
Default to "needs_more_info" rather than "plausible" unless the submission is clearly complete and internally consistent. Never imply you checked this against a real government database — you didn't.`;
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 400,
          system: sys,
          messages: [{ role: 'user', content: JSON.stringify(fields, null, 2) }]
        })
      });
      const data = await response.json();
      const text = (data.content || []).map(c => c.text || '').join('\n');
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      if (!parsed.recommendation) throw new Error('unexpected shape');
      return parsed;
    } catch (e) {
      return { recommendation: 'needs_more_info', reasoning: 'AI check could not complete — review manually.' };
    }
  }
  function assessmentBlock(type, key, cache) {
    const a = cache[key];
    if (a === 'loading') return `<p class="nh-note" style="margin-top:8px;">Running AI check…</p>`;
    if (!a) return `<button class="nh-btn ghost mini" data-ai-check="${key}" data-ai-type="${type}" style="margin-top:8px;">Run AI check</button>`;
    const cls = a.recommendation === 'plausible' ? 'verified' : a.recommendation === 'red_flags' ? 'rejected' : 'pending';
    const label = a.recommendation === 'plausible' ? 'AI: looks consistent' : a.recommendation === 'red_flags' ? 'AI: red flags' : 'AI: needs more info';
    return `<div style="margin-top:8px;"><span class="nh-badge ${cls}">${label}</span><p class="nh-note" style="margin-top:4px;">${a.reasoning || ''}</p></div>`;
  }

  async function callAgent(userText) {
    const sys = `You are a funding assistant for a verified NGO on the NIVARA hub. NGO profile: name=${ngoProfile.name}, area of work=${ngoProfile.area}, established=${ngoProfile.year}.

Your job, in order:
1. Ask short clarifying questions about the funding need — amount needed, purpose, number of beneficiaries, timeline — one or two questions per turn, not a long list at once.
2. Once you have enough detail, summarize the request back in plain words and name only the general category of support it likely fits (e.g. "a state education grant" or "a CSR livelihood program"). Never invent or state a specific scheme name, exact eligibility rule, deadline, or funding amount — you have no live access to scheme databases, so any specific-sounding detail you produce would be a guess presented as fact.
3. Once summarized, tell them to open the "Funders & applications" tab: they can describe the same need there, see funders from the hub's directory that match, and have AI draft an application for them to review and send themselves. Never say an application has already been "submitted," "filed," or "approved" from this chat — this chat only gathers requirements, it doesn't file anything on its own.
4. Never ask for, or repeat back, bank account numbers, passwords, OTPs, or ID numbers. Registration already collected what's needed. If the user shares such details in chat anyway, tell them gently that it isn't needed here and they shouldn't share it in this chat.
5. If a message is off-topic, respond briefly and kindly, then steer the conversation back to their funding need without lecturing.

      ? `<span class="nh-badge verified" style="margin-bottom:6px;display:inline-flex;">${DONATION_CATEGORIES[it.category].label}</span><br>`
      : '';
    const matchLine = it.matchedNgoName ? `<p style="margin-top:4px;font-size:11.5px;color:var(--moss);">Nearest match: ${it.matchedNgoName}</p>` : '';
    let applyLine = '';
    if (listKey === 'jobs' && role === 'citizen' && citizenProfile && it.key) {
      const already = appliedJobKeys.has(it.key);
      applyLine = already
        ? `<span class="nh-badge verified" style="margin-top:8px;display:inline-flex;"><i class="ti ti-check"></i>Applied</span>`
        : `<button class="nh-btn mini" data-apply-job="${it.key}" data-job-title="${escAttr(it.title)}" style="margin-top:8px;">Apply</button>`;
    }
    const postedLine = it.postedBy ? `<p style="margin-top:4px;font-size:11.5px;color:#9a9888;">Posted by ${it.postedBy}</p>` : '';
    return `<div class="nh-list-item">${badge}<h4>${it.title}</h4><p>${it.body}</p>${matchLine}${postedLine}${applyLine}</div>`;
  }
  function donationForm() {
    const firstCat = Object.keys(DONATION_CATEGORIES)[0];
    return `<div class="nh-card">
      ${donationNotice ? `<p class="nh-note" style="color:var(--moss);margin-top:0;margin-bottom:10px;">${donationNotice}</p>` : ''}
      <div class="nh-row">
      <div class="nh-field"><label>Category</label>
        <select id="don-cat">
          ${Object.entries(DONATION_CATEGORIES).map(([code, c]) => `<option value="${code}">${c.label}</option>`).join('')}
        </select>
      </div>
      <div class="nh-field"><label>Pickup location</label><input id="don-loc" placeholder="e.g. Uppal, Hyderabad"></div>
      </div>
      <div class="nh-field"><label>Item and quantity</label><input id="don-item" placeholder="${DONATION_CATEGORIES[firstCat].hint}"></div>
      <button class="nh-btn" id="don-post">Post donation</button></div>`;
  }
  function collabForm() {
    return `<div class="nh-card"><div class="nh-row">
      <div class="nh-field"><label>Organization name</label><input id="collab-org" placeholder="e.g. Acme Foundation"></div>
      <div class="nh-field"><label>Collaboration type</label><input id="collab-type" placeholder="e.g. CSR grant, volunteering"></div>
      </div><div class="nh-field"><label>Details</label><textarea id="collab-body" placeholder="What kind of NGOs are you looking to partner with?"></textarea></div>
      <button class="nh-btn" id="collab-post">Post offer</button></div>`;
  }
  function jobsForm() {
    return `<div class="nh-card"><div class="nh-row">
      <div class="nh-field"><label>Role title</label><input id="jobs-title" placeholder="e.g. Field coordinator"></div>
      <div class="nh-field"><label>Type</label><input id="jobs-type" placeholder="e.g. Internship, 3 months"></div>
      </div><div class="nh-field"><label>Description</label><textarea id="jobs-body" placeholder="Responsibilities and requirements"></textarea></div>
      <button class="nh-btn" id="jobs-post">Post opening</button></div>`;
  }

  // ---------- Events (organizations host, verified NGOs collaborate) ----------
  let eventsCache = null;
  let eventNotice = '';
  function eventForm() {
    const ngos = directoryCache || [];
    return `<div class="nh-card">
      ${eventNotice ? `<p class="nh-note" style="color:var(--moss);margin-top:0;margin-bottom:10px;">${eventNotice}</p>` : ''}
      <div class="nh-row">
        <div class="nh-field"><label>Event title</label><input id="ev-title" placeholder="e.g. Community health camp"></div>
        <div class="nh-field"><label>Date</label><input id="ev-date" type="date"></div>
      </div>
      <div class="nh-field"><label>Location</label><input id="ev-loc" placeholder="e.g. Community hall, Uppal"></div>
      <div class="nh-field"><label>Description</label><textarea id="ev-body" placeholder="What's the event, and what kind of NGO collaboration are you looking for?"></textarea></div>
      <div class="nh-field"><label>Invite verified NGOs to collaborate</label>
        <div style="display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto;border:1px solid var(--line);border-radius:6px;padding:8px;background:#fdfcf9;">
          ${ngos.length ? ngos.map(n => `<label style="font-size:12.5px;display:flex;gap:6px;align-items:center;"><input type="checkbox" class="ev-invite-check" value="${n.id}" data-name="${n.name}"> ${n.name} (${n.area})</label>`).join('') : '<span style="font-size:12px;color:#9a9888;">No verified NGOs on the hub yet.</span>'}
        </div>
      </div>
      <button class="nh-btn" id="ev-post">Post event</button>
    </div>`;
  }
  function renderEventItem(ev) {
    const invited = ev.invited || [];
    const confirmed = ev.confirmed || [];
    const isInvitedNgo = role === 'ngo' && ngoProfile && invited.some(i => i.id === ngoProfile.id);
    const alreadyConfirmed = role === 'ngo' && ngoProfile && confirmed.includes(ngoProfile.id);
    const confirmedNames = invited.filter(i => confirmed.includes(i.id)).map(i => i.name);
    return `<div class="nh-list-item">
      <h4>${ev.title}</h4>
      <p>${ev.date ? ev.date + ' · ' : ''}${ev.location}</p>
      ${ev.body ? `<p style="margin-top:4px;">${ev.body}</p>` : ''}
      <p style="margin-top:6px;font-size:11.5px;color:#9a9888;">Hosted by ${ev.hostOrgName}${invited.length ? ' · Invited: ' + invited.map(i => i.name).join(', ') : ''}</p>
      ${confirmedNames.length ? `<p style="margin-top:4px;font-size:11.5px;color:var(--moss);">Collaborating: ${confirmedNames.join(', ')}</p>` : ''}
      ${isInvitedNgo ? (alreadyConfirmed
        ? `<span class="nh-badge verified" style="margin-top:8px;display:inline-flex;"><i class="ti ti-check"></i>You're collaborating</span>`
        : `<button class="nh-btn mini" data-confirm-event="${ev.key}" style="margin-top:8px;">Confirm collaboration</button>`) : ''}
    </div>`;
  }
  function eventsView() {
    const items = eventsCache || [];
    const isOrg = role === 'org';
    return `
      <span class="nh-eyebrow">Community feature</span>
      <h2>Events</h2>
      <p class="nh-lede">${isOrg ? 'Host an event and invite verified NGOs to collaborate on it.' : 'Verified NGOs can confirm collaboration on events organizations invite them to.'}</p>
      ${isOrg ? eventForm() : ''}
      <div id="events-items">
        ${items.length ? items.map(renderEventItem).join('') : '<div class="nh-empty">No events posted yet.</div>'}
      </div>
    `;
  }
  async function loadEvents() {
    try {
      const idx = await window.storage.list('events:', true);
      const items = [];
      for (const k of (idx?.keys || [])) {
        const r = await window.storage.get(k, true).catch(() => null);
        if (r) items.push({ key: k, ...JSON.parse(r.value) });
      }
      eventsCache = items.reverse();
    } catch(e) { eventsCache = eventsCache || []; }
    render();
  }
  function bindEvents() {
    if (eventsCache === null) loadEvents();
    if (role === 'org') {
      if (directoryCache === null) loadDirectoryData().then(() => render());
      const btn = document.getElementById('ev-post');
      if (btn) btn.onclick = async () => {
        const title = document.getElementById('ev-title').value.trim();
        const date = document.getElementById('ev-date').value;
        const loc = document.getElementById('ev-loc').value.trim();
        const body = document.getElementById('ev-body').value.trim();
        if (!title || !loc) return;
        const invited = Array.from(document.querySelectorAll('.ev-invite-check:checked')).map(c => ({ id: c.value, name: c.dataset.name }));
        const rec = { title, date, location: loc, body, hostOrgName: orgProfile.name, hostOrgEmail: orgProfile.email, invited, confirmed: [] };
        await window.storage.set('events:' + Date.now(), JSON.stringify(rec), true);
        eventNotice = invited.length
          ? `Event posted and ${invited.length} NGO${invited.length > 1 ? 's' : ''} invited to collaborate.`
          : 'Event posted. No NGOs invited yet — select some next time to line up collaborators.';
        loadEvents();
      };
    }
    document.querySelectorAll('[data-confirm-event]').forEach(b => b.onclick = async () => {
      const key = b.dataset.confirmEvent;
      try {
        const r = await window.storage.get(key, true);
        const ev = JSON.parse(r.value);
        ev.confirmed = ev.confirmed || [];
        if (!ev.confirmed.includes(ngoProfile.id)) ev.confirmed.push(ngoProfile.id);
        await window.storage.set(key, JSON.stringify(ev), true);
        loadEvents();
      } catch(e) { console.error(e); }
    });
  }
  async function loadList(key) {
    try {
      const idx = await window.storage.list(listConfig[key].prefix + ':', true);
      const items = [];
      for (const k of (idx?.keys || [])) {
        const r = await window.storage.get(k, true).catch(() => null);
        if (r) items.push({ key: k, ...JSON.parse(r.value) });
      }
      listCache[key] = items.reverse();
      if (key === 'jobs' && role === 'citizen' && citizenProfile) await loadMyApplications();
    } catch(e) { listCache[key] = listCache[key] || []; }
    render();
  }
  function bindTab(tab) {
    if (tab === 'register') bindRegister();
    if (tab === 'citizen-login') bindCitizenLogin();
    if (tab === 'org-login') bindOrgLogin();
    if (tab === 'admin-login') bindAdminLogin();
    if (tab === 'admin-hub') bindAdminHub();
    if (tab === 'agent') bindAgent();
    if (tab === 'funders') bindFunders();
    if (tab === 'donations') bindList('donations');
    if (tab === 'collab') bindList('collab');
    if (tab === 'jobs') bindList('jobs');
    if (tab === 'events') bindEvents();
    if (tab === 'directory') loadDirectory();
  }
  function bindRegister() {
    document.getElementById('btn-verify').onclick = async () => {
      const name = document.getElementById('f-name').value.trim();
      const reg = document.getElementById('f-reg').value.trim();
      const cert = document.getElementById('f-cert').value.trim();
      const year = document.getElementById('f-year').value.trim();
      const area = document.getElementById('f-area').value.trim();
      const bank = document.getElementById('f-bank').value.trim();
      if (!(name && reg && cert && year && area && bank)) {
        registerFormError = 'Please fill in every field before submitting.';
        render();
        return;
      }
      registerFormError = '';
      // Submissions are queued as pending — the admin portal's AI check and human review decide
      // verified/rejected from here (see adminSetNgoStatus), not this form.
      ngoProfile = { name, reg, cert, year, area, bank, status: 'pending', id: 'ngo_' + Date.now() };
      try {
        await window.storage.set('ngo:' + ngoProfile.id, JSON.stringify(ngoProfile), true);
      } catch(e) { console.error(e); }
      render();
    };
  }
  function bindList(key) {
    if (!listCache[key]) loadList(key);
    if (key === 'donations' && role === 'ngo' && isAuthed()) {
      if (notifyCache === null) loadNotifications();
      document.querySelectorAll('[data-notif-dismiss]').forEach(b => b.onclick = async () => {
        await window.storage.delete(b.dataset.notifDismiss, true).catch(() => {});
        loadNotifications();
      });
    }
    if (key === 'donations') {
      const catSelect = document.getElementById('don-cat');
      const itemInput = document.getElementById('don-item');
      if (catSelect && itemInput) {
        catSelect.onchange = () => { itemInput.placeholder = DONATION_CATEGORIES[catSelect.value].hint; };
      }
      const filterSelect = document.getElementById('donation-filter');
      if (filterSelect) filterSelect.onchange = (e) => { donationFilter = e.target.value; render(); };
      const btn = document.getElementById('don-post');
      if (btn) btn.onclick = async () => {
        const category = document.getElementById('don-cat').value;
        const item = document.getElementById('don-item').value.trim();
        const loc = document.getElementById('don-loc').value.trim();
        if (!item || !loc) return;
        const ngos = await ensureNgoDirectory();
        const match = findNearestNgo(loc, ngos);
        const rec = { category, title: item, body: 'Pickup at ' + loc, matchedNgoName: match ? match.name : null };
        await window.storage.set('donations:' + Date.now(), JSON.stringify(rec), true);
        if (match) {
          await window.storage.set('notify:' + match.id + ':' + Date.now(), JSON.stringify({ title: item, loc }), true).catch(() => {});
          donationNotice = `Nearest match notified: ${match.name}. They'll see it the next time they check the donation board.`;
        } else {
          donationNotice = 'Posted. No verified NGO in that area yet, so it stays visible to every NGO on the hub.';
        }
        loadList('donations');
      };
    }
    if (key === 'collab') {
      const btn = document.getElementById('collab-post');
      if (btn) btn.onclick = async () => {
        const org = document.getElementById('collab-org').value.trim();
        const type = document.getElementById('collab-type').value.trim();
        const body = document.getElementById('collab-body').value.trim();
        if (!org || !type) return;
        const rec = { title: org + ' — ' + type, body };
        await window.storage.set('collab:' + Date.now(), JSON.stringify(rec), true);
        loadList('collab');
      };
    }
    if (key === 'jobs') {
      const btn = document.getElementById('jobs-post');
      if (btn) btn.onclick = async () => {
        const title = document.getElementById('jobs-title').value.trim();
        const type = document.getElementById('jobs-type').value.trim();
        const body = document.getElementById('jobs-body').value.trim();
        if (!title) return;
        const postedBy = (role === 'ngo' ? ngoProfile?.name : orgProfile?.name) || null;
        const rec = { title: title + ' (' + type + ')', body, postedBy };
        await window.storage.set('jobs:' + Date.now(), JSON.stringify(rec), true);
        loadList('jobs');
      };
    }
    if (key === 'jobs' && role === 'citizen' && citizenProfile) {
      document.querySelectorAll('[data-apply-job]').forEach(b => b.onclick = async () => {
        const jobKey = b.dataset.applyJob;
        const jobTitle = b.dataset.jobTitle;
        const rec = { jobKey, jobTitle, applicantName: citizenProfile.name, applicantPhone: citizenProfile.phone, appliedAt: Date.now() };
        try {
          await window.storage.set('jobapp:' + citizenProfile.phone + ':' + jobKey, JSON.stringify(rec), false);
          appliedJobKeys.add(jobKey);
          jobApplyNotice = `Applied to "${jobTitle}". This is saved to your account. Note: this demo doesn't yet have a shared employer inbox, so the NGO/organization won't automatically see it — that would need a small backend to connect the two sides.`;
        } catch (e) { jobApplyNotice = 'Could not record the application — please try again.'; }
        render();
      });
    }
  }

  // ---------- Directory ----------
  let directoryCache = null;
  function directoryView() {
    const items = directoryCache || [];
    return `
      <span class="nh-eyebrow">Public feature</span>
      <h2>Public NGO directory</h2>
      <p class="nh-lede">Every verified NGO on the hub, visible to citizens, organizations, and funders.</p>
      <div class="nh-stat-grid">
        <div class="nh-stat"><b>${items.length}</b><span>Verified on this hub</span></div>
        <div class="nh-stat"><b>${new Set(items.map(i=>i.area)).size || 0}</b><span>Focus areas on hub</span></div>
        <div class="nh-stat"><b>1.87L</b><span>Registered nationally*</span></div>
        <div class="nh-stat"><b>28</b><span>States and UTs covered*</span></div>
      </div>
      <p class="nh-note">*National figures are from the government's NGO Darpan (NITI Aayog) portal, approximately 1,87,395 registered NGOs as of its last public count. Estimates vary by source and year, ranging from about 1.87 lakh to over 5 lakh depending on methodology — the hub numbers above (verified on this hub) are the only ones this platform can confirm directly.</p>
      <div id="directory-items">
        ${items.length ? items.map(i => `<div class="nh-list-item"><h4>${i.name}</h4><p>${i.area} · est. ${i.year}</p></div>`).join('') : '<div class="nh-empty">No verified NGOs yet. Register one to see it listed here.</div>'}
      </div>
    `;
  }
  async function loadDirectory() {
    await loadDirectoryData();
    render();
  }

  render();
})();
</script>
